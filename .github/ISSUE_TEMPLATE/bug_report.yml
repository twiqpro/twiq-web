name: Bug Report
description: Report a bug in TWIQ Web
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: The chart fails to load when switching to 5M timeframe...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Start backend with ./scripts/dev-backend.sh
        2. Open http://localhost:3000
        3. Click ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - Backend
        - WebSocket / live feed
        - DhanHQ integration
        - Dev tooling / CI
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Commit or version
      description: Git commit SHA or release tag, if known
      placeholder: main @ abc1234

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs, browser console output, or screenshots
    validations:
      required: false
