services:
  - type: web
    name: twiq-backend
    runtime: python
    rootDir: backend
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.11"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      # Set these in Render dashboard as Secrets (token is ~24h in manual mode)
      - key: DHANHQ_ACCESS_TOKEN
        sync: false
      - key: DHANHQ_CLIENT_ID
        sync: false
      - key: CORS_ORIGINS
        value: https://twiqpro.netlify.app,http://localhost:3000,http://127.0.0.1:3000

